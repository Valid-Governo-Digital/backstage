apiVersion: v1
kind: Service
metadata:
  name: backstage-hub-postgres
  labels:
    app: backstage-hub-postgres
spec:
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app: backstage-hub-postgres
  clusterIP: None
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backstage-hub-postgres
  labels:
    app: backstage-hub-postgres
spec:
  selector:
    matchLabels:
      app: backstage-hub-postgres
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: backstage-hub-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: backstage
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: backstage-hub-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backstage-hub-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: backstage-hub-postgres-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backstage-hub-postgres-pvc
  labels:
    app: backstage-hub-postgres
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
